<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Result Sheet</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MAIN CARD */
.card{
    width:90%;
    max-width:900px;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1f4037;
    color:white;
    padding:12px 15px;
    border-radius:10px;
}

/* STATUS */
.status{
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    color:white;
}
.pass{background:green;}
.fail{background:red;}

/* CENTER STUDENT INFO */
.info{
    text-align:center;
    margin-top:20px;
    padding:15px;
    background:#f4f4f4;
    border-radius:10px;
}

.info h2{
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

/* MARKS TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* BOX */
.box{
    padding:15px;
    border-radius:10px;
    background:#f9f9f9;
}

/* RESPONSIVE */
@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="card">

    <!-- HEADER -->
    <div class="header">
        <h2>Student Result Analysis</h2>
        <span id="status" class="status"></span>
    </div>

    <!-- CENTER STUDENT DETAILS -->
    <div class="info">
        <h2>👨‍🎓 Student Details</h2>
        <p><b>Name:</b> Rahul Sharma</p>
        <p><b>Class:</b> 10th</p>
        <p><b>Roll No:</b> 21</p>
        <p><b>School:</b> Modern High School</p>
    </div>

    <!-- CONTENT -->
    <div class="grid">

        <!-- MARKS -->
        <div class="box">
            <h3>📊 Marks Sheet</h3>

            <table>
                <tr><th>Subject</th><th>Marks</th></tr>
                <tr><td>Math</td><td>82</td></tr>
                <tr><td>Science</td><td>76</td></tr>
                <tr><td>English</td><td>71</td></tr>
                <tr><td>Computer</td><td>90</td></tr>
            </table>

            <h3>Total: <span id="total"></span></h3>
            <h3>Percentage: <span id="percent"></span>%</h3>
        </div>

        <!-- GRAPH -->
        <div class="box">
            <h3>📈 Performance Graph</h3>
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script>

// MARKS
let marks = [82,76,71,90];

// TOTAL
let total = marks.reduce((a,b)=>a+b,0);
let percent = (total / marks.length).toFixed(2);

// DISPLAY
document.getElementById("total").innerText = total;
document.getElementById("percent").innerText = percent;

// PASS/FAIL
let status = document.getElementById("status");

if(percent >= 40){
    status.innerText = "PASS ✔ " + percent + "%";
    status.classList.add("pass");
} else {
    status.innerText = "FAIL ❌ " + percent + "%";
    status.classList.add("fail");
}

// GRAPH
new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
        labels:["Math","Science","English","Computer"],
        datasets:[{
            label:"Marks",
            data:marks,
            backgroundColor:["#1f4037","#2c5364","#4caf50","#ff9800"]
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{display:false}
        }
    }
});

</script>

</body>
</html>
